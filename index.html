<body>
  <div class="app">
    <!-- AUTH -->
    <section id="auth-screen" class="auth-screen active">
      <div class="auth-left">
        <div class="brand-logo">Q</div>

        <h1>Quantio AI</h1>

        <p>Banking Intelligence. Personal AI. Permanent Memory.</p>

        <div class="auth-features">
          <div>✓ Secure Cloud Sync</div>
          <div>✓ Voice Assistant</div>
          <div>✓ Long-Term Memory</div>
          <div>✓ Offline Ready</div>
        </div>
      </div>

      <div class="auth-right">
        <div class="login-card">
          <h2>Welcome Back</h2>

          <form id="auth-form">
            <input
              id="email"
              type="email"
              placeholder="Email Address"
              required
            />

            <input
              id="password"
              type="password"
              placeholder="Password"
              required
            />

            <button id="auth-submit" type="submit" class="btn-primary">
              Login
            </button>
          </form>

          <button id="toggle-auth-mode" class="btn-secondary">
            Create Account
          </button>

          <div id="auth-message"></div>
        </div>
      </div>
    </section>

    <!-- MAIN APP -->

    <section id="main-screen" class="main-screen">
      <header class="topbar">
        <div class="logo">
          <div class="logo-icon">Q</div>
          <span>Quantio</span>
        </div>

        <div class="top-actions">
          <button id="button-insight">Analytics</button>

          <button id="button-export">Export</button>

          <button id="button-settings">Settings</button>
        </div>
      </header>

      <div class="workspace">
        <!-- SIDEBAR -->

        <aside class="sidebar">
          <button id="button-new-chat" class="new-chat">+ New Chat</button>

          <input id="history-search" placeholder="Search conversations..." />

          <div id="history-list" class="history-list"></div>
        </aside>

        <!-- CHAT -->

        <main class="chat-area">
          <div id="network-status" class="status-bar">
            Quantio Neural Core Online
          </div>

          <div class="hero">
            <h1>Welcome to Quantio</h1>

            <p>Your AI Operating System</p>

            <div class="quick-actions">
              <button>Generate Website</button>

              <button>Analyze Code</button>

              <button>Create Dashboard</button>

              <button>Build API</button>
            </div>
          </div>

          <div id="message-list" class="messages"></div>

          <div class="composer">
            <button id="mic-button" class="icon-btn">🎤</button>

            <input id="message-input" placeholder="Ask Quantio anything..." />

            <button id="send-button" class="send-btn">Send</button>
          </div>
        </main>
      </div>
    </section>

    <!-- SETTINGS -->

    <div id="settings-drawer" class="settings-drawer">
      <div class="drawer-header">
        <h2>Settings</h2>

        <button id="close-settings">✕</button>
      </div>

      <input
        id="setting-api-key"
        type="password"
        placeholder="Gemini API Key"
      />

      <select id="setting-style">
        <option value="normal">Balanced</option>

        <option value="short">Concise</option>

        <option value="funny">Creative</option>
      </select>

      <button id="save-settings" class="btn-primary">Save</button>
    </div>

    <div id="toast"></div>
  </div>

  <script src="script.js"></script>
</body>
